name: dotnet build and test

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore ./CryptoAnalyzer.sln

      - name: Build
        run: dotnet build ./CryptoAnalyzer.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test ./CryptoAnalyzer.sln --no-build --configuration Release --verbosity normal